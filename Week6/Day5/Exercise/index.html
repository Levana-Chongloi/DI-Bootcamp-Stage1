<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <section id="quoteSection">
    <h2>Generated Quote:</h2>
    <p id="quote"></p>
    <div id="likeSection">
      <button id="likeBtn">Like</button>
      <span id="likeCount"></span>
    </div>
  </section>

  <button id="generateBtn">Generate Quote</button>

  <form id="addQuoteForm">
    <input type="text" id="quoteInput" placeholder="Quote" required>
    <input type="text" id="authorInput" placeholder="Author" required>
    <button type="submit">Add Quote</button>
  </form>

  <form id="filterForm">
    <input type="text" id="authorFilterInput" placeholder="Author Name">
    <button type="button" id="filterBtn">Filter</button>
  </form>

  <div id="navigationButtons">
    <button id="previousBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
